syntax = "proto3";

package user.v1;

option go_package = "github.com/freesoulcode/free-ecommerce/gen/go/proto/user/v1;userv1";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc CreateAddress(CreateAddressRequest) returns (CreateAddressResponse);
  rpc GetAddress(GetAddressRequest) returns (GetAddressResponse);
  rpc UpdateAddress(UpdateAddressRequest) returns (UpdateAddressResponse);
  rpc DeleteAddress(DeleteAddressRequest) returns (DeleteAddressResponse);
  rpc ListAddresses(ListAddressesRequest) returns (ListAddressesResponse);
}

message Address {
  int64 id = 1;
  int64 user_id = 2;
  string receiver_name = 3;
  string receiver_phone = 4;
  string country_code = 5;
  string province = 6;
  string city = 7;
  string district = 8;
  string address_line1 = 9;
  string address_line2 = 10;
  string postal_code = 11;
  string tag = 12;
  bool is_default = 13;
  int64 created_at = 14;
  int64 updated_at = 15;
}

message CreateUserRequest {
  string email = 1;
  string phone = 2;
  string nickname = 3;
}

message CreateUserResponse {
  int64 id = 1;
  string email = 2;
  string phone = 3;
  string nickname = 4;
  string status = 5;
  bool email_verified = 6;
  bool phone_verified = 7;
}

message DeleteUserRequest {
  int64 id = 1;
}

message DeleteUserResponse {}

message GetUserRequest {
  int64 id = 1;
}

message GetUserResponse {
  int64 id = 1;
  string email = 2;
  string phone = 3;
  string nickname = 4;
  string status = 5;
  bool email_verified = 6;
  bool phone_verified = 7;
}

message CreateAddressRequest {
  int64 user_id = 1;
  string receiver_name = 2;
  string receiver_phone = 3;
  string country_code = 4;
  string province = 5;
  string city = 6;
  string district = 7;
  string address_line1 = 8;
  string address_line2 = 9;
  string postal_code = 10;
  string tag = 11;
  bool is_default = 12;
}

message CreateAddressResponse {
  Address address = 1;
}

message GetAddressRequest {
  int64 id = 1;
  int64 user_id = 2;
}

message GetAddressResponse {
  Address address = 1;
}

message UpdateAddressRequest {
  int64 id = 1;
  int64 user_id = 2;
  string receiver_name = 3;
  string receiver_phone = 4;
  string country_code = 5;
  string province = 6;
  string city = 7;
  string district = 8;
  string address_line1 = 9;
  string address_line2 = 10;
  string postal_code = 11;
  string tag = 12;
  bool is_default = 13;
}

message UpdateAddressResponse {
  Address address = 1;
}

message DeleteAddressRequest {
  int64 id = 1;
  int64 user_id = 2;
}

message DeleteAddressResponse {}

message ListAddressesRequest {
  int64 user_id = 1;
}

message ListAddressesResponse {
  repeated Address addresses = 1;
}
