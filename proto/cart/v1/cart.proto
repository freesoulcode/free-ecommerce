syntax = "proto3";

package cart.v1;

option go_package = "github.com/freesoulcode/free-ecommerce/gen/go/proto/cart/v1;cartv1";

service CartService {
  rpc AddCartItem(AddCartItemRequest) returns (AddCartItemResponse);
  rpc UpdateCartItem(UpdateCartItemRequest) returns (UpdateCartItemResponse);
  rpc DeleteCartItem(DeleteCartItemRequest) returns (DeleteCartItemResponse);
  rpc ListCartItems(ListCartItemsRequest) returns (ListCartItemsResponse);
}

message CartItem {
  int64 id = 1;
  int64 user_id = 2;
  int64 sku_id = 3;
  int64 product_id = 4;
  int64 shop_id = 5;
  string shop_name = 6;
  string product_title = 7;
  string product_sub_title = 8;
  string main_image_url = 9;
  string sku_name = 10;
  int64 price_amount = 11;
  string currency = 12;
  int32 stock = 13;
  int32 quantity = 14;
  bool selected = 15;
  string review_status = 16;
  string product_sale_status = 17;
  string sku_sale_status = 18;
  bool available = 19;
  int64 created_at = 20;
  int64 updated_at = 21;
}

message AddCartItemRequest {
  int64 user_id = 1;
  int64 sku_id = 2;
  int32 quantity = 3;
}

message AddCartItemResponse {
  CartItem item = 1;
}

message UpdateCartItemRequest {
  int64 id = 1;
  int64 user_id = 2;
  int32 quantity = 3;
  bool selected = 4;
}

message UpdateCartItemResponse {
  CartItem item = 1;
}

message DeleteCartItemRequest {
  int64 id = 1;
  int64 user_id = 2;
}

message DeleteCartItemResponse {}

message ListCartItemsRequest {
  int64 user_id = 1;
}

message ListCartItemsResponse {
  repeated CartItem items = 1;
}
