apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "local-mysql.fullname" . }}
spec:
  serviceName: {{ include "local-mysql.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "local-mysql.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "local-mysql.name" . }}
    spec:
      containers:
        - name: mysql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "local-mysql.fullname" . }}
                  key: root-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: initdb
          configMap:
            name: {{ include "local-mysql.fullname" . }}-initdb
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
{{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
{{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
