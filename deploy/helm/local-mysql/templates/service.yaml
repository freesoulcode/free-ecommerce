apiVersion: v1
kind: Service
metadata:
  name: {{ include "local-mysql.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "local-mysql.name" . }}
  ports:
    - name: mysql
      port: {{ .Values.service.port }}
      targetPort: mysql
{{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
{{- end }}
